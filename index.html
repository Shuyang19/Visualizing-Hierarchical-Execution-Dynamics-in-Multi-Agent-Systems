<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multi-Agent Behavior Tree Visualization</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <div class="page-header">
      <h1>Multi-Agent Behavior Tree Visualization</h1>
      <p class="subtitle">Real-time hierarchical execution dynamics — Georgia Institute of Technology</p>

      <div class="dataset-bar">
        <div class="dataset-picker">
          <label for="datasetSelect">Dataset</label>
          <select id="datasetSelect" class="dataset-select" onchange="switchDataset(this.value)">
            <option value="pacman">pacmanData.js - Multi-Agent Strategy</option>
            <option value="sokoban">sokobanData.js - Single-Agent Decision</option>
            <option value="dual">dualagentData.js - Real-Time Combat</option>
            <option value="fuzzby">fuzzbyData.js - Rule-Based Decision Making</option>
          </select>
        </div>
        <div class="dataset-note" id="datasetNote"></div>
      </div>

      <div class="selector-card">
        <div class="selector-main">
          <div class="selector-panel">
            <div class="selector-header">
              <div class="section-label">Visible agents</div>
              <div class="selector-hint">Select one or more agents to compare</div>
            </div>
            <div class="agent-selector" id="agentSelector"></div>
          </div>

          <div class="timeline-footer">
            <div class="legend" id="legend"></div>
            <div class="controls">
              <label>Tick</label>
              <input type="range" id="tickSlider" min="0" max="0" value="0" step="1"
                oninput="onSlider(this.value)">
              <span class="tick-display" id="tickDisplay">tick 0</span>
              <button id="playBtn" onclick="togglePlay()">⏸ Pause</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="timeline-overlay" aria-hidden="true">
      <div class="shared-tick-dim shared-tick-dim-left" id="sharedTickDimLeft"></div>
      <div class="shared-tick-dim shared-tick-dim-right" id="sharedTickDimRight"></div>
      <div class="shared-tick-focus" id="sharedTickFocus"></div>
      <div class="shared-tick-line" id="sharedTickLine"></div>
      <div class="shared-tick-label" id="sharedTickLabel">tick 0</div>
    </div>

    <div class="viz-layout">
      <div class="section-label">Behavior trees</div>
      <div class="section-label">Execution timeline</div>
      <div id="agentRows"></div>
    </div>
  </div>

  <script>
    const DATASET_CONFIG = Object.freeze({
      pacman: {
        file: 'pacmanData.js',
        label: 'Multi-Agent Strategy',
        title: 'Pac-Man'
      },
      sokoban: {
        file: 'sokobanData.js',
        label: 'Single-Agent Decision',
        title: 'Sokoban'
      },
      dual: {
        file: 'dualagentData.js',
        label: 'Real-Time Combat',
        title: 'DualAgent'
      },
      fuzzby: {
        file: 'fuzzbyData.js',
        label: 'Rule-Based Decision Making',
        title: 'Fuzzby'
      }
    });

    const DEFAULT_DATASET = 'fuzzby';

    function getActiveDatasetKey() {
      const params = new URLSearchParams(window.location.search);
      const candidate = params.get('dataset');
      return Object.prototype.hasOwnProperty.call(DATASET_CONFIG, candidate)
        ? candidate
        : DEFAULT_DATASET;
    }

    function updateDatasetChrome(datasetKey) {
      const dataset = DATASET_CONFIG[datasetKey];
      const select = document.getElementById('datasetSelect');
      const note = document.getElementById('datasetNote');

      if (select) {
        select.value = datasetKey;
      }

      if (note) {
        note.textContent = `Loaded: ${dataset.file} · ${dataset.title} · ${dataset.label}`;
      }

      document.title = `${dataset.title} | Multi-Agent Behavior Tree Visualization`;
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.onload = resolve;
        script.onerror = () => reject(new Error(`Failed to load ${src}`));
        document.body.appendChild(script);
      });
    }

    function switchDataset(nextKey) {
      const datasetKey = Object.prototype.hasOwnProperty.call(DATASET_CONFIG, nextKey)
        ? nextKey
        : DEFAULT_DATASET;
      const params = new URLSearchParams(window.location.search);

      if (datasetKey === DEFAULT_DATASET) {
        params.delete('dataset');
      } else {
        params.set('dataset', datasetKey);
      }

      const nextQuery = params.toString();
      const nextUrl = `${window.location.pathname}${nextQuery ? `?${nextQuery}` : ''}`;
      window.location.assign(nextUrl);
    }

    window.switchDataset = switchDataset;

    const activeDatasetKey = getActiveDatasetKey();
    updateDatasetChrome(activeDatasetKey);

    loadScript(DATASET_CONFIG[activeDatasetKey].file)
      .then(() => loadScript('main.js'))
      .catch(error => {
        console.error(error);
        const note = document.getElementById('datasetNote');
        if (note) {
          note.textContent = `Load failed: ${error.message}`;
        }
      });
  </script>

  <div class="node-tooltip" id="nodeTooltip" hidden></div>
</body>
</html>
